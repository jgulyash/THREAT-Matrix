<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">

  <!-- White background -->
  <rect width="900" height="260" fill="#ffffff" rx="8" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="900" height="44" fill="#0f172a" rx="8"/>
  <rect y="36" width="900" height="8" fill="#0f172a"/>
  <text x="24" y="27" fill="#ffffff" font-size="13" font-weight="700" letter-spacing="1">THREAT MATRIX</text>
  <text x="182" y="27" fill="#475569" font-size="13" font-weight="400">·</text>
  <text x="194" y="27" fill="#94a3b8" font-size="13" font-weight="400" letter-spacing="0.5">Kill Chain</text>

  <!-- ── PHASE 1: Target Development ── -->
  <rect x="16" y="56" width="192" height="172" fill="#ffffff" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="16" y="56" width="192" height="5" fill="#3b82f6" rx="6"/>
  <rect x="16" y="58" width="192" height="3" fill="#3b82f6"/>
  <!-- Phase label -->
  <text x="28" y="81" fill="#3b82f6" font-size="10" font-weight="700" letter-spacing="1.5">PHASE 1</text>
  <!-- Phase name -->
  <text x="28" y="101" fill="#0f172a" font-size="17" font-weight="700">Target</text>
  <text x="28" y="121" fill="#0f172a" font-size="17" font-weight="700">Development</text>
  <!-- Divider -->
  <line x1="28" y1="132" x2="196" y2="132" stroke="#f1f5f9" stroke-width="1"/>
  <!-- Sub-items -->
  <text x="28" y="150" fill="#475569" font-size="13">Selection</text>
  <text x="28" y="168" fill="#475569" font-size="13">Profiling</text>
  <text x="28" y="184" fill="#475569" font-size="13">Survey</text>
  <text x="28" y="200" fill="#475569" font-size="13">Capability Acquisition</text>
  <!-- CPN badge -->
  <rect x="28" y="208" width="38" height="18" fill="#eff6ff" rx="3" stroke="#bfdbfe" stroke-width="1"/>
  <text x="47" y="220" fill="#3b82f6" font-size="10" font-weight="700" text-anchor="middle">CPN</text>

  <!-- Arrow 1→2 -->
  <line x1="211" y1="142" x2="226" y2="142" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="226,137 236,142 226,147" fill="#cbd5e1"/>

  <!-- ── PHASE 2: Mobilization ── -->
  <rect x="240" y="56" width="192" height="172" fill="#ffffff" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="240" y="56" width="192" height="5" fill="#8b5cf6" rx="6"/>
  <rect x="240" y="58" width="192" height="3" fill="#8b5cf6"/>
  <text x="252" y="81" fill="#8b5cf6" font-size="10" font-weight="700" letter-spacing="1.5">PHASE 2</text>
  <text x="252" y="101" fill="#0f172a" font-size="17" font-weight="700">Mobilization</text>
  <line x1="252" y1="112" x2="420" y2="112" stroke="#f1f5f9" stroke-width="1"/>
  <text x="252" y="132" fill="#475569" font-size="13">Staging</text>
  <text x="252" y="150" fill="#475569" font-size="13">Rehearsal</text>
  <text x="252" y="168" fill="#475569" font-size="13">Infiltration</text>
  <text x="252" y="186" fill="#475569" font-size="13">Position Establishment</text>
  <rect x="252" y="196" width="38" height="18" fill="#f5f3ff" rx="3" stroke="#ddd6fe" stroke-width="1"/>
  <text x="271" y="208" fill="#8b5cf6" font-size="10" font-weight="700" text-anchor="middle">CPN</text>

  <!-- Arrow 2→3 -->
  <line x1="435" y1="142" x2="450" y2="142" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="450,137 460,142 450,147" fill="#cbd5e1"/>

  <!-- ── PHASE 3: Execution ── -->
  <rect x="464" y="56" width="192" height="172" fill="#ffffff" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="464" y="56" width="192" height="5" fill="#ef4444" rx="6"/>
  <rect x="464" y="58" width="192" height="3" fill="#ef4444"/>
  <text x="476" y="81" fill="#ef4444" font-size="10" font-weight="700" letter-spacing="1.5">PHASE 3</text>
  <text x="476" y="101" fill="#0f172a" font-size="17" font-weight="700">Execution</text>
  <line x1="476" y1="112" x2="644" y2="112" stroke="#f1f5f9" stroke-width="1"/>
  <text x="476" y="132" fill="#475569" font-size="13">Attack Execution</text>
  <text x="476" y="150" fill="#475569" font-size="13">Concurrent Operations</text>
  <rect x="476" y="178" width="38" height="18" fill="#fff5f5" rx="3" stroke="#fecaca" stroke-width="1"/>
  <text x="495" y="190" fill="#ef4444" font-size="10" font-weight="700" text-anchor="middle">CPN</text>

  <!-- Arrow 3→4 -->
  <line x1="659" y1="142" x2="674" y2="142" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="674,137 684,142 674,147" fill="#cbd5e1"/>

  <!-- ── PHASE 4: Aftermath ── -->
  <rect x="688" y="56" width="196" height="172" fill="#ffffff" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="688" y="56" width="196" height="5" fill="#10b981" rx="6"/>
  <rect x="688" y="58" width="196" height="3" fill="#10b981"/>
  <text x="700" y="81" fill="#10b981" font-size="10" font-weight="700" letter-spacing="1.5">PHASE 4</text>
  <text x="700" y="101" fill="#0f172a" font-size="17" font-weight="700">Aftermath</text>
  <!-- Flight + Claim sub-labels -->
  <rect x="700" y="110" width="48" height="20" fill="#f0fdf4" rx="3" stroke="#bbf7d0" stroke-width="1"/>
  <text x="724" y="124" fill="#059669" font-size="11" font-weight="600" text-anchor="middle">Flight</text>
  <text x="754" y="124" fill="#94a3b8" font-size="11">·</text>
  <rect x="760" y="110" width="46" height="20" fill="#f0fdf4" rx="3" stroke="#bbf7d0" stroke-width="1"/>
  <text x="783" y="124" fill="#059669" font-size="11" font-weight="600" text-anchor="middle">Claim</text>
  <line x1="700" y1="136" x2="872" y2="136" stroke="#f1f5f9" stroke-width="1"/>
  <text x="700" y="156" fill="#475569" font-size="13">Flight — cover, flee, blend</text>
  <text x="700" y="174" fill="#475569" font-size="13">Claim — amplify, message</text>
  <rect x="700" y="196" width="38" height="18" fill="#f0fdf4" rx="3" stroke="#bbf7d0" stroke-width="1"/>
  <text x="719" y="208" fill="#10b981" font-size="10" font-weight="700" text-anchor="middle">CPN</text>

  <!-- Footer note -->
  <text x="450" y="247" fill="#94a3b8" font-size="11" text-anchor="middle" font-style="italic">Descriptive model — phases may compress, skip, or reorder based on adversary opportunity and capability</text>

</svg>
